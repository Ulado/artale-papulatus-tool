<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Artale 困難拉圖斯 - 輔助工具</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 360px; background: #1e1e1e; border-right: 1px solid #333; padding: 15px; display: flex; flex-direction: column; overflow-y: auto; }
        .main-content { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .monitor-card { background: #2c2c2c; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #444; transition: transform 0.2s ease; /* 滑鼠移上去的動畫 */ }
        .monitor-card:hover { transform: translateY(-2px); border-color: #e870d0; /* 懸停時邊框變色 */}
        .guild-title { font-size: 0.95rem; font-weight: 600; letter-spacing: 1.5px; /* 增加字距讓文字看起來更高檔 *//* 漸層文字效果 */background: linear-gradient(45deg, #e870d0, #ff9cdb); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;/* 文字發光感 */filter: drop-shadow(0 0 5px rgba(232, 112, 208, 0.4)); display: flex; align-items: center; }
        /* 可以在文字前加個小圖標裝飾 */
        .guild-title::before { content: "✦"; margin-right: 8px; font-size: 0.8rem; color: #e870d0; }
        .val { font-size: 2.2rem; font-weight: bold; color: #40c057; text-align: center; }
        #img-container { position: relative; display: inline-block; }
        #main-img { max-width: 100%; max-height: 15vh; display: block; }
        #video-container { position: relative; display: inline-block; }
        #main-video { max-width: 100%; max-height: 85vh; display: block; }
        .roi-box { position: absolute; border: 2px solid #fff; box-sizing: border-box; cursor: move; min-width: 30px; min-height: 20px; z-index: 1000; }
        .roi-box::after { content: attr(data-label); position: absolute; top: -22px; left: 0; background: rgba(0,0,0,0.8); font-size: 11px; padding: 2px 6px; white-space: nowrap; border-radius: 3px; }
        .resizer { width: 14px; height: 14px; background: white; position: absolute; right: -7px; bottom: -7px; cursor: nwse-resize; border-radius: 50%; border: 2px solid #000; z-index: 1001; }
        #hp-roi { border-color: #4dabf7; background: rgba(77, 171, 247, 0.2); }
        #crack-roi { border-color: #ffd43b; background: rgba(255, 212, 59, 0.2); }
        .debug-canvas { width: 100%; height: 45px; background: #000; border: 1px solid #555; margin-top: 5px; }
        button { background: #343a40; color: white; border: none; padding: 10px; margin: 4px 0; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; }
        .btn-primary { background: #228be6; }
        .btn-manual { background: #fa5252; }
        .btn-reset { background: #495057; }
        .btn-save { background: #fab005; color: #000; }
        .log { background: #000; color: #51cf66; font-family: monospace; font-size: 11px; padding: 10px; flex: 1; min-height: 4rem; overflow-y: auto; border: 1px solid #333; margin-top: 2px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="monitor-card">
        <div class="guild-title">aespaaa 公會製作</div>
    </div>

    <div class="monitor-card">
        <div style="font-size: 0.8rem; color: #aaa;">血量偵測 (HP %)</div>
        <div id="hp-display" class="val">-- %</div>
        <div id="hp-dev-msg" style="color: #ffd43b; font-weight: bold; text-align: left; min-height: 15rem; font-size: 0.9rem;"></div>
        <input type="range" min="0" max="100" value="100" style="width:100%" oninput="manualHPAdjust(this.value)">
    </div>

    <div class="monitor-card">
        <div style="font-size: 0.8rem; color: #aaa;">黑水倒數計時器</div>
        <div id="crack-timer" class="val">READY</div>
        <div style="display: flex; gap: 5px; align-items: center;">
            <select id="crack-duration" style="background:#444; color:white; border:none; flex: 1; height: 2rem;">
                <option value="60">60s</option>
                <option value="65">65s</option>
                <option value="70" selected>70s</option>
                <option value="75">75s</option>
                <option value="80">80s</option>
            </select>
            <button class="btn-reset" style="flex: 1;" onclick="resetCrackTimer()">重置計時</button>
        </div>
        <button class="btn-manual" onclick="triggerCrack('手動', true)">手動 / 立即重置計時</button>
        <div id="ocr-crack-raw" style="font-size: 10px; color: #ffd43b; min-height: 3rem; text-align: center; margin-top:5px;">偵測內容：等待中...</div>
    </div>

    <button class="btn-primary" onclick="initCapture()">連結 遊戲畫面</button>
    <button class="btn-save" onclick="saveSettings()">💾 儲存 偵測框 位置設定</button>

    <div style="margin-top:10px;">
        <div style="font-size: 0.8rem; color: #aaa;">血量 偵測框 預覽</div>
        <canvas id="hp-debug" class="debug-canvas"></canvas>
        <div style="font-size: 0.8rem; color: #aaa;">黑水 偵測框 預覽</div>
        <canvas id="crack-debug" class="debug-canvas"></canvas>
    </div>
    <div style="font-size: 0.8rem; color: #aaa;">紀錄日誌</div>
    <div class="log" id="sys-log">系統：準備就緒。</div>
</div>

<div class="main-content">
    <div id="img-container">
        <img id="main-img" src="./安全點位置.png">
    </div>
    <div id="video-container">
        <video id="main-video" autoplay muted></video>
        <div id="hp-roi" class="roi-box" data-label="血量白字區"><div class="resizer"></div></div>
        <div id="crack-roi" class="roi-box" data-label="對話框偵測區"><div class="resizer"></div></div>
    </div>
</div>

<script>
    const video = document.getElementById('main-video');
    const hpDbg = document.getElementById('hp-debug');
    const crackDbg = document.getElementById('crack-debug');
    const hpCtx = hpDbg.getContext('2d', {willReadFrequently: true});
    const crackCtx = crackDbg.getContext('2d', {willReadFrequently: true});

    // 設定僅讀取座標
    let config = JSON.parse(localStorage.getItem('artale_v7_config')) || {
        hp: { top: 50, left: 100, width: 120, height: 35 },
        crack: { top: 400, left: 200, width: 250, height: 60 }
    };

    let hpWorker = null, crackWorker = null;
    let isHpBusy = false, isCrackBusy = false;
    let lastCrackTrigger = 0, crackItv, isManualHP = false;

    // ==========================================================
    // 開發者自訂區域 - 血量邏輯判斷
    // ==========================================================
    function checkHPLogic(percent) {
        const msgEl = document.getElementById('hp-dev-msg');
        const p = parseInt(percent);

        // 在這裡撰寫您的判斷條件
        if (p <= 19) {
            msgEl.innerText = "HP <= 19%";
            msgEl.innerText += "\n時鐘：-60分/10s";
            msgEl.innerText += "\n會有 雷射、炸彈、反盾、黑水、紅鬧鐘\n";
            msgEl.innerText += "\n雷射：紅色(暈眩)、藍色(禁跳)";
            msgEl.innerText += "\n炸彈：施放間隔 30s, 隨機標記玩家頭上出現炸彈, 本人不死，但炸死周圍隊友";
            msgEl.innerText += "\n反盾：會召喚黑球, 每顆沒清扣 10 分鐘";
            msgEl.innerText += "\n紅鬧鐘：請站在安全點, 連續召喚 7 個紅鬧鐘攻擊";
        } else if (p <= 49) {
            msgEl.innerText = "HP <= 49%";
            msgEl.innerText += "\n時鐘：-50分/10s";
            msgEl.innerText += "\n會有 藍鬧鐘、雷射、炸彈、反盾、黑水、紅鬧鐘\n";
            msgEl.innerText += "\n雷射：紅色(暈眩)、藍色(禁跳)";
            msgEl.innerText += "\n炸彈：施放間隔 30s, 隨機標記玩家頭上出現炸彈, 本人不死，但炸死周圍隊友";
            msgEl.innerText += "\n反盾：會召喚黑球, 每顆沒清扣 10 分鐘";
            msgEl.innerText += "\n紅鬧鐘：請站在安全點, 固定紅藍紅順序攻擊";
        } else if (p <= 70) {
            msgEl.innerText = "HP <= 70%";
            msgEl.innerText += "\n時鐘：-40分/10s";
            msgEl.innerText += "\n會有 拍地板、藍鬧鐘、雷射、炸彈、反盾、黑水、分身召喚\n";
            msgEl.innerText += "\n雷射：紅色(暈眩)、藍色(禁跳)";
            msgEl.innerText += "\n炸彈：施放間隔 30s, 隨機標記玩家頭上出現炸彈, 本人不死，但炸死周圍隊友";
            msgEl.innerText += "\n反盾：會召喚黑球, 每顆沒清扣 10 分鐘";
            msgEl.innerText += "\n黑水：施放間隔 70s";
            msgEl.innerText += "\n分身召喚(一次)：優先處理，30s 施放一次技能";
        } else if (p <= 84) {
            msgEl.innerText = "HP <= 84%";
            msgEl.innerText += "\n時鐘：-30分/10s";
            msgEl.innerText += "\n會有 拍地板、藍鬧鐘、雷射、炸彈、反盾\n";
            msgEl.innerText += "\n雷射：紅色(暈眩)、藍色(禁跳)";
            msgEl.innerText += "\n炸彈：施放間隔 30s, 隨機標記玩家頭上出現炸彈, 本人不死，但炸死周圍隊友";
            msgEl.innerText += "\n反盾：會召喚黑球, 每顆沒清扣 10 分鐘";
        } else if (p <= 90) {
            msgEl.innerText = "HP <= 90%";
            msgEl.innerText += "\n時鐘：-20分/10s";
            msgEl.innerText += "\n會有 拍地板、藍鬧鐘、雷射\n";
            msgEl.innerText += "\n雷射：紅色(暈眩)、藍色(禁跳)";
        } else if (p <= 100) {
            msgEl.innerText = "HP <= 100%";
            msgEl.innerText += "\n會有 拍地板、藍鬧鐘";
        } else {
            return;
            // msgEl.innerText = ""; // 高於設定趴數則不顯示
        }
    }

    // ==========================================================
    // 開發者自訂區域 - 黑水關鍵字判斷
    // ==========================================================
    function checkCrackKeywords(rawText) {
        const text = rawText.toLowerCase();

        // 如果偵測到的文字包含以下關鍵字，即觸發倒數
        // 當需要修改辨識內容時，請修改或增加 includes 中的字串
        const keywords = ["watch", "step", "your", "注意你的", "你的腳下", "腳下"];

        return keywords.some(key => text.includes(key));
    }
    // ==========================================================

    function setupDraggable(id) {
        const el = document.getElementById(id);
        let m = false, r = false, sx, sy, sw, sh, sl, st;
        el.onmousedown = (e) => {
            if (e.target.className === 'resizer') r = true; else m = true;
            sx = e.clientX; sy = e.clientY;
            sw = el.offsetWidth; sh = el.offsetHeight;
            sl = el.offsetLeft; st = el.offsetTop;
            e.stopPropagation();
        };
        document.addEventListener('mousemove', (e) => {
            if (m) { el.style.left = (sl + (e.clientX - sx)) + 'px'; el.style.top = (st + (e.clientY - sy)) + 'px'; }
            else if (r) { el.style.width = Math.max(20, sw + (e.clientX - sx)) + 'px'; el.style.height = Math.max(10, sh + (e.clientY - sy)) + 'px'; }
        });
        document.addEventListener('mouseup', () => { m = false; r = false; });
    }

    window.onload = async () => {
        applyUI();
        setupDraggable('hp-roi'); setupDraggable('crack-roi');
        hpWorker = await Tesseract.createWorker('eng');
        crackWorker = await Tesseract.createWorker('eng+chi_tra');
        addLog("OCR 引擎載入完成。");
    };

    async function initCapture() {
        try {
            video.srcObject = await navigator.mediaDevices.getDisplayMedia({ video: true });
            analyzeLoop();
        } catch (e) { addLog("連結視窗取消。"); }
    }

    function analyzeLoop() {
        if (video.paused || video.ended || video.videoWidth === 0) {
            requestAnimationFrame(analyzeLoop); return;
        }
        const scale = video.videoWidth / video.offsetWidth;

        if (!isHpBusy && hpWorker) {
            captureROI(document.getElementById('hp-roi'), hpCtx, hpDbg, scale);
            processHpOCR();
        }
        if (!isCrackBusy && crackWorker) {
            captureROI(document.getElementById('crack-roi'), crackCtx, crackDbg, scale);
            processCrackOCR();
        }
        requestAnimationFrame(analyzeLoop);
    }

    function captureROI(el, ctx, canvas, scale) {
        const w = el.offsetWidth * scale, h = el.offsetHeight * scale;
        canvas.width = w; canvas.height = h;
        ctx.drawImage(video, el.offsetLeft * scale, el.offsetTop * scale, w, h, 0, 0, w, h);
    }

    async function processHpOCR() {
        isHpBusy = true;
        try {
            const { data: { text } } = await hpWorker.recognize(hpDbg);
            const match = text.match(/(\d+)%/);
            if (match && !isManualHP) updateHPUI(match[1]);
        } catch (e) {}
        isHpBusy = false;
    }

    async function processCrackOCR() {
        isCrackBusy = true;
        try {
            const { data: { text } } = await crackWorker.recognize(crackDbg);
            const raw = text.trim();
            if (raw.length > 0) {
                document.getElementById('ocr-crack-raw').innerText = "偵測內容：" + raw;
                if (checkCrackKeywords(raw)) {
                    triggerCrack("自動偵測", false);
                }
            }
        } catch (e) {}
        isCrackBusy = false;
    }

    function triggerCrack(src, force) {
        const now = Date.now();
        // 如果是手動觸發，忽略 15 秒冷卻時間
        if (!force && (now - lastCrackTrigger < 15000)) return;

        lastCrackTrigger = now;
        clearInterval(crackItv);
        const dur = parseInt(document.getElementById('crack-duration').value);
        let s = dur;
        const el = document.getElementById('crack-timer');
        el.style.color = "#fa5252";
        addLog(`[${src}] 啟動 ${dur}s 倒數。`);

        crackItv = setInterval(() => {
            s--; el.innerText = s + "s";
            if (s <= 0) {
                clearInterval(crackItv); el.innerText = "READY"; el.style.color = "#40c057";
                speak("注意黑水");
            }
        }, 1000);
    }

    function resetCrackTimer() {
        clearInterval(crackItv);
        document.getElementById('crack-timer').innerText = "READY";
        document.getElementById('crack-timer').style.color = "#40c057";
        addLog("黑水倒數已重置並停止。");
    }

    function updateHPUI(p) {
        document.getElementById('hp-display').innerText = p + "%";
        checkHPLogic(p); // 執行開發者自訂邏輯
    }

    function manualHPAdjust(val) {
        isManualHP = true; updateHPUI(val);
        clearTimeout(window.hpTimer);
        window.hpTimer = setTimeout(() => isManualHP = false, 5000);
    }

    function applyUI() {
        ['hp', 'crack'].forEach(k => {
            const el = document.getElementById(k + '-roi');
            el.style.top = config[k].top + 'px'; el.style.left = config[k].left + 'px';
            el.style.width = config[k].width + 'px'; el.style.height = config[k].height + 'px';
        });
    }

    function saveSettings() {
        ['hp', 'crack'].forEach(k => {
            const el = document.getElementById(k + '-roi');
            config[k] = { top: el.offsetTop, left: el.offsetLeft, width: el.offsetWidth, height: el.offsetHeight };
        });
        // 僅儲存座標設定，不儲存警示文字內容
        localStorage.setItem('artale_v7_config', JSON.stringify(config));
        addLog("框位設定儲存成功。");
    }

    function addLog(m) {
        const l = document.getElementById('sys-log');
        l.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${m}`;
        l.scrollTop = l.scrollHeight;
    }
    function speak(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
</script>
</body>
</html>

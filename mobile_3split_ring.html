<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Artale 困難拉圖斯 - 輔助工具</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@500;700&display=swap');

    :root {
      --color-mobs: #4db34d;
      --color-water: #4a90e2;
      --color-system: #a362cc;

      --bg: #0b0f17;
      --text: #eaf2ff;
      --muted: rgba(234,242,255,.7);
      --ring-bg: rgba(255,255,255,.10);
    }

    * { touch-action: manipulation; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* 頂部工具列 */
    .topbar {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(10px);
    }
    .topbar .title {
      font-weight: 800;
      letter-spacing: .5px;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar .guild-tag {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 12px;
      color: #ffcc00;
      white-space: nowrap;
    }
    .topbar label {
      display:flex;
      align-items:center;
      gap:6px;
      font-weight: 800;
      font-size: 13px;
      user-select: none;
      white-space: nowrap;
    }

    /* ✅ 左右三欄滿版 */
    .timer-grid {
      height: 100dvh;
      display: flex;
      flex-direction: row;   /* 左右 */
    }

    .timer-card {
      flex: 1 1 33.333%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      border: none;
      border-radius: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      position: relative;
    }

    /* ✅ 每個區塊內改成「上下」：標題/設定在上，圈圈在下（窄螢幕也舒服） */
    .panel {
      width: min(30vw, 420px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .timer-title {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(16px, 1.9vw, 22px);
      font-weight: 900;
      letter-spacing: .5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      flex: 0 0 auto;
      box-shadow: 0 0 18px rgba(255,255,255,.10);
    }

    .settings-area {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }
    .settings-area input[type="number"] {
      width: 78px;
      padding: 8px 10px;
      border-radius: 14px;
      border: 0;
      outline: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-size: 14px;
      font-weight: 900;
      text-align: center;
    }

    .voice-switch {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      background: rgba(255,255,255,.06);
      padding: 7px 9px;
      border-radius: 999px;
      outline: 1px solid rgba(255,255,255,.10);
      user-select: none;
    }

    .reset-btn {
      font-size: 11px;
      padding: 7px 9px;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      background: rgba(255,255,255,.10);
      color: var(--text);
      outline: 1px solid rgba(255,255,255,.12);
      font-weight: 900;
    }
    .reset-btn:active { transform: translateY(1px); }

    /* ✅ 圓環 + 中間時間（更不重疊） */
    .ringWrap {
      flex: 0 0 auto;
      width: clamp(150px, 18vw, 220px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      position: relative;
      cursor: pointer;
      user-select: none;
      margin-top: 6px;
    }

    .ringWrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .ringBg { stroke: var(--ring-bg); stroke-width: 10; fill: transparent; }  /* ✅ 更細 */
    .ring {
      stroke: var(--accent);
      stroke-width: 10;      /* ✅ 更細 */
      fill: transparent;
      stroke-linecap: round;
      filter: drop-shadow(0 0 10px rgba(0,0,0,.35));
    }

    .timer-display {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: clamp(30px, 3.6vw, 46px); /* ✅ 字變小 */
      font-weight: 950;
      letter-spacing: 1px;
      color: var(--text);
      transition: color 0.1s;
      font-family: 'Arial Black', sans-serif;
    }
    .running-text { color: #ff6b6b; text-shadow: 1px 1px 2px rgba(0,0,0,0.25); }

    .hint {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      opacity: .9;
      text-align: center;
    }

    /* ✅ 10 秒警示閃爍（每卡獨立） */
    @keyframes warnBlink {
      0%   { background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)); }
      50%  { background: color-mix(in srgb, var(--accent) 20%, rgba(255,255,255,.02)); }
      100% { background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)); }
    }
    .timer-card.warn {
      animation: warnBlink .5s linear infinite;
    }

    .footer-hint {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 10;
      text-align: center;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,.06);
      border-radius: 14px;
      backdrop-filter: blur(10px);
    }

    .accent-mobs { --accent: var(--color-mobs); }
    .accent-water { --accent: var(--color-water); }
    .accent-system { --accent: var(--color-system); }

    /* ✅ 超窄直向時自動改回上下避免擠爆 */
    @media (max-width: 720px) and (orientation: portrait) {
      body{ overflow:auto; }
      .timer-grid{ flex-direction: column; }
      .panel{ width: min(92vw, 520px); }
      .timer-card{ min-height: 33dvh; }
      .ringWrap{ width: clamp(170px, 48vw, 260px); }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="title">困難拉圖斯攻略助手</div>
    <label style="cursor:pointer;">
      <input type="checkbox" id="auto-restart" checked>
      <span>🕒 循環模式</span>
    </label>
    <div class="guild-tag">感謝 aespaaa 公會開源 - Ulado調整</div>
  </div>

  <div class="timer-grid">
    <!-- mobs -->
    <div class="timer-card accent-mobs" id="card-mobs">
      <div class="panel">
        <div class="timer-title"><span class="dot"></span>召喚小怪 (屋頂)</div>
        <div class="settings-area">
          <div class="input-row">
            <input type="number" id="input-mobs" value="50" min="1"> <span>s</span>
            <button class="reset-btn" onclick="resetSetting('mobs', 50)">設定重置</button>
          </div>
          <label class="voice-switch">
            <input type="checkbox" id="voice-mobs" checked> 🔊 語音
          </label>
        </div>

        <div class="ringWrap" onclick="handleTimer('mobs')">
          <svg viewBox="0 0 120 120" aria-hidden="true">
            <circle class="ringBg" cx="60" cy="60" r="44"></circle>
            <circle class="ring" id="ring-mobs" cx="60" cy="60" r="44"></circle>
          </svg>
          <div id="display-mobs" class="timer-display">50.0</div>
        </div>
        <div class="hint">點圈圈：重新開始｜雙擊：重置</div>
      </div>
    </div>

    <!-- water -->
    <div class="timer-card accent-water" id="card-water">
      <div class="panel">
        <div class="timer-title"><span class="dot"></span>黑水生成 (即死)</div>
        <div class="settings-area">
          <div class="input-row">
            <input type="number" id="input-water" value="70" min="1"> <span>s</span>
            <button class="reset-btn" onclick="resetSetting('water', 70)">設定重置</button>
          </div>
          <label class="voice-switch">
            <input type="checkbox" id="voice-water" checked> 🔊 語音
          </label>
        </div>

        <div class="ringWrap" onclick="handleTimer('water')">
          <svg viewBox="0 0 120 120" aria-hidden="true">
            <circle class="ringBg" cx="60" cy="60" r="44"></circle>
            <circle class="ring" id="ring-water" cx="60" cy="60" r="44"></circle>
          </svg>
          <div id="display-water" class="timer-display">70.0</div>
        </div>
        <div class="hint">點圈圈：重新開始｜雙擊：重置</div>
      </div>
    </div>

    <!-- system -->
    <div class="timer-card accent-system" id="card-system">
      <div class="panel">
        <div class="timer-title"><span class="dot"></span>系統扣時 (指針)</div>
        <div class="settings-area">
          <div class="input-row">
            <input type="number" id="input-system" value="10" min="1"> <span>s</span>
            <button class="reset-btn" onclick="resetSetting('system', 10)">設定重置</button>
          </div>
          <label class="voice-switch">
            <input type="checkbox" id="voice-system" checked> 🔊 語音
          </label>
        </div>

        <div class="ringWrap" onclick="handleTimer('system')">
          <svg viewBox="0 0 120 120" aria-hidden="true">
            <circle class="ringBg" cx="60" cy="60" r="44"></circle>
            <circle class="ring" id="ring-system" cx="60" cy="60" r="44"></circle>
          </svg>
          <div id="display-system" class="timer-display">10.0</div>
        </div>
        <div class="hint">點圈圈：重新開始｜雙擊：重置</div>
      </div>
    </div>
  </div>

  <div class="footer-hint">
    💡 點圈圈：重新開始倒數｜<b>快速雙擊：重置到設定秒數</b><br>
    ✅ 黑水 / 召喚小怪：進入 10 秒會獨立閃爍提醒
  </div>

<script>
  const timers = {
    mobs: { timeLeft: 50, interval: null, running: false, lastClick: 0 },
    water: { timeLeft: 70, interval: null, running: false, lastClick: 0 },
    system: { timeLeft: 10, interval: null, running: false, lastClick: 0 }
  };

  let voiceUnlocked = false;

  const R = 44;
  const C = 2 * Math.PI * R;

  ["mobs","water","system"].forEach(id => {
    const ring = document.getElementById(`ring-${id}`);
    if (ring) {
      ring.style.strokeDasharray = `${C}`;
      ring.style.strokeDashoffset = `${0}`;
    }
    updateRing(id);
    updateWarn(id);
  });

  function handleTimer(id) {
    if (!voiceUnlocked) unlockVoice();

    const now = Date.now();
    const timer = timers[id];
    const inputVal = parseFloat(document.getElementById(`input-${id}`).value) || 10;

    // 保留雙擊 reset（不自動開始）
    if (now - timer.lastClick < 500) {
      resetTimer(id, inputVal);
      timer.lastClick = 0;
      return;
    }
    timer.lastClick = now;

    // 單擊：重啟（reset + start）
    resetTimer(id, inputVal);
    startTimer(id);
  }

  function unlockVoice() {
    if (!('speechSynthesis' in window)) return;
    const silentUtterance = new SpeechSynthesisUtterance('');
    silentUtterance.volume = 0;
    window.speechSynthesis.speak(silentUtterance);
    voiceUnlocked = true;
  }

  function startTimer(id) {
    const timer = timers[id];
    const display = document.getElementById(`display-${id}`);

    if (timer.interval) clearInterval(timer.interval);

    timer.running = true;
    display.classList.add('running-text');

    timer.interval = setInterval(() => {
      timer.timeLeft -= 0.1;

      const autoRestart = document.getElementById('auto-restart').checked;
      const isVoiceEnabled = document.getElementById(`voice-${id}`).checked;

      if (timer.timeLeft <= 0) {
        if (isVoiceEnabled) {
          if (id === "mobs") speak("召喚小怪");
          else if (id === "water") speak("黑水");
          else if (id === "system") speak("系統扣時");
        }

        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

        if (autoRestart) {
          const inputVal = parseFloat(document.getElementById(`input-${id}`).value);
          timer.timeLeft = inputVal;
        } else {
          timer.timeLeft = 0;
          pauseTimer(id);
        }
      }

      display.innerText = Math.max(0, timer.timeLeft).toFixed(1);
      updateRing(id);
      updateWarn(id);
    }, 100);
  }

  function pauseTimer(id) {
    const timer = timers[id];
    const display = document.getElementById(`display-${id}`);

    clearInterval(timer.interval);
    timer.interval = null;
    timer.running = false;

    display.classList.remove('running-text');
    updateRing(id);
    updateWarn(id);
  }

  function resetTimer(id, duration) {
    const timer = timers[id];
    const display = document.getElementById(`display-${id}`);

    clearInterval(timer.interval);
    timer.interval = null;
    timer.running = false;
    timer.timeLeft = duration;

    display.innerText = duration.toFixed(1);
    display.classList.remove('running-text');

    updateRing(id);
    updateWarn(id);
  }

  function resetSetting(id, defaultVal) {
    document.getElementById(`input-${id}`).value = defaultVal;
    resetTimer(id, defaultVal);
  }

  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-TW';
    utterance.pitch = 1;
    utterance.rate = 1.2;
    utterance.volume = 1;
    setTimeout(() => { window.speechSynthesis.speak(utterance); }, 0);
  }

  function updateRing(id) {
    const ring = document.getElementById(`ring-${id}`);
    if (!ring) return;

    const timer = timers[id];
    const duration = parseFloat(document.getElementById(`input-${id}`).value) || 10;

    const p = Math.max(0, Math.min(1, timer.timeLeft / duration));
    const offset = C * (1 - p);

    ring.style.strokeDasharray = `${C}`;
    ring.style.strokeDashoffset = `${offset}`;
  }

  // ✅ mobs/water 進入 10 秒倒數就閃爍（各自獨立）
  function updateWarn(id) {
    const card = document.getElementById(`card-${id}`);
    if (!card) return;

    // 只有 mobs / water 要
    if (id !== "mobs" && id !== "water") {
      card.classList.remove("warn");
      return;
    }

    const timer = timers[id];
    const isWarning = timer.running && timer.timeLeft > 0 && timer.timeLeft <= 10;

    if (isWarning) card.classList.add("warn");
    else card.classList.remove("warn");
  }
</script>
</body>
</html>
